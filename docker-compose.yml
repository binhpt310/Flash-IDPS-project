# Flash-IDPS Docker Compose Configuration
# Provides easy container management for the Jupyter notebook environment

version: '3.8'

services:
  # Main Jupyter Notebook Service (CPU version)
  flash-idps:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: flash-idps-notebook
    ports:
      - "8888:8888"
    volumes:
      # Mount notebook directory for persistence
      - ./:/app:cached
      # Mount data directory for datasets
      - ./data:/app/data
      # Mount models directory for saved models
      - ./models:/app/models
      # Mount output directory for results
      - ./output:/app/output
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - NB_USER=jupyter
      - NB_UID=1000
      - PYTHONUNBUFFERED=1
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    # Restart policy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - flash-idps-network

  # GPU-enabled version
  flash-idps-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      target: final
    container_name: flash-idps-gpu-notebook
    ports:
      - "8889:8888"
    volumes:
      - ./:/app:cached
      - ./data:/app/data
      - ./models:/app/models
      - ./output:/app/output
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flash-idps-network
    profiles:
      - gpu

networks:
  flash-idps-network:
    driver: bridge

# Named volumes for persistent data (optional alternative to bind mounts)
volumes:
  flash-idps-data:
  flash-idps-models:
  flash-idps-output:
